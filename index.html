<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QVestido · Rastreamento de Envios</title>
<link rel="icon" href="https://recursos.qvestido.com.br/i/SVG-diversos/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.29.7/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ================= TEMAS ================= */
:root, [data-theme="claro"]{
  --bg:#FBF9F7; --surface:#ffffff; --surface-2:#F6F1EE; --surface-3:#F0E9E4;
  --ink:#2A2320; --ink-soft:#5A5049; --muted:#8A8078; --line:#ECE4DE; --line-strong:#DFD5CD;
  --accent:#B45B78; --accent-ink:#8E3F59; --accent-soft:#F6E6EC; --on-accent:#fff;
  --tone-mix:14%;
  --shadow:0 1px 2px rgba(42,35,32,.04), 0 8px 24px -12px rgba(42,35,32,.16);
  --radius:14px;
}
[data-theme="escuro"]{
  --bg:#171311; --surface:#201B18; --surface-2:#292320; --surface-3:#322A26;
  --ink:#F3ECE6; --ink-soft:#CDC2BA; --muted:#A2958C; --line:#332B26; --line-strong:#42372F;
  --accent:#DB8CA3; --accent-ink:#EDAABC; --accent-soft:#3A2A30; --on-accent:#20181B;
  --tone-mix:24%;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 30px -14px rgba(0,0,0,.6);
}
[data-theme="rosa"]{
  --bg:#FFF5F8; --surface:#ffffff; --surface-2:#FDEBF1; --surface-3:#FADFE8;
  --ink:#40232E; --ink-soft:#6E4B57; --muted:#A5808D; --line:#F7DFE7; --line-strong:#F0CBD8;
  --accent:#E0698F; --accent-ink:#C24C73; --accent-soft:#FCE4EC; --on-accent:#fff;
  --tone-mix:14%;
  --shadow:0 1px 2px rgba(190,110,140,.06), 0 8px 24px -12px rgba(190,110,140,.28);
  --radius:14px;
}
[data-theme="azul"]{
  --bg:#F3F8FD; --surface:#ffffff; --surface-2:#E8F1FA; --surface-3:#DBE9F6;
  --ink:#1E2E3D; --ink-soft:#465B70; --muted:#7A8FA3; --line:#DEEAF4; --line-strong:#C9DCEC;
  --accent:#5B95CC; --accent-ink:#3F76AC; --accent-soft:#E2EFFA; --on-accent:#fff;
  --tone-mix:14%;
  --shadow:0 1px 2px rgba(60,110,160,.06), 0 8px 24px -12px rgba(60,110,160,.28);
  --radius:14px;
}
[data-theme="verde"]{
  --bg:#F4FAF6; --surface:#ffffff; --surface-2:#E9F4EC; --surface-3:#DDEDE2;
  --ink:#1F332A; --ink-soft:#456055; --muted:#7B968A; --line:#DFEEE4; --line-strong:#C9E1D1;
  --accent:#5AA37C; --accent-ink:#3F8461; --accent-soft:#E3F2E9; --on-accent:#fff;
  --tone-mix:14%;
  --shadow:0 1px 2px rgba(60,140,100,.06), 0 8px 24px -12px rgba(60,140,100,.28);
  --radius:14px;
}

/* ================= BASE ================= */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
}
button, input, select, textarea{font-family:inherit}
button{cursor:pointer}
::selection{background:var(--accent-soft)}
.em{width:1em;height:1em;vertical-align:-.15em;display:inline-block;object-fit:contain}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important; transition-duration:.01ms !important}}

/* ================= TOPBAR ================= */
.topbar{position:sticky; top:0; z-index:40; background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:saturate(1.4) blur(12px); border-bottom:1px solid var(--line);}
.topbar-inner{max-width:1240px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; gap:18px;}
.brand{display:flex; align-items:center; gap:12px; user-select:none}
.brand img{height:24px; width:auto; display:block}
.brand .sub{font-size:11.5px; color:var(--muted); letter-spacing:0; padding-left:12px; border-left:1px solid var(--line-strong)}
.nav{display:flex; gap:2px; background:var(--surface-2); padding:4px; border-radius:12px}
.nav button{border:0; background:transparent; color:var(--ink-soft); padding:7px 14px; border-radius:9px; font-size:13.5px; font-weight:500; transition:.15s; display:flex; align-items:center; gap:7px;}
.nav button.active{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}
.nav .dot{background:var(--accent); color:var(--on-accent); font-size:11px; font-weight:600; min-width:18px; height:18px; padding:0 5px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center}
.spacer{flex:1}
.icon-btn{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); width:38px; height:38px; border-radius:10px; display:grid; place-items:center; transition:.15s; position:relative}
.icon-btn:hover{border-color:var(--accent); color:var(--accent)}
.btn{border:1px solid transparent; background:var(--accent); color:var(--on-accent); padding:9px 16px; border-radius:10px; font-weight:600; font-size:13.5px; display:inline-flex; align-items:center; gap:8px; transition:.15s;}
.btn:hover{background:var(--accent-ink)}
.btn.ghost{background:var(--surface); color:var(--ink); border-color:var(--line-strong)}
.btn.ghost:hover{border-color:var(--accent); color:var(--accent); background:var(--surface)}
.btn:disabled{opacity:.5; cursor:not-allowed}
.btn.sm{padding:7px 12px; font-size:12.5px}
.btn.danger{background:#C0553F; color:#fff} .btn.danger:hover{filter:brightness(.92); background:#C0553F}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

/* ================= LAYOUT ================= */
.wrap{max-width:1240px; margin:0 auto; padding:24px 22px 110px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}

.cards{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; position:relative; overflow:hidden;}
.card .n{font-size:26px; font-weight:700; line-height:1; letter-spacing:-.03em}
.card .l{font-size:11.5px; color:var(--muted); margin-top:6px; text-transform:uppercase; letter-spacing:.05em; font-weight:600}
.card .bar{position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--tone, var(--accent))}
.card .n{color:var(--tone, var(--ink))}

.toolbar{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:18px; display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end;}
.field{display:flex; flex-direction:column; gap:5px}
.field label{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; padding-left:2px}
.input{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); padding:8px 11px; border-radius:9px; font-size:13.5px; min-height:37px; transition:.15s; width:100%}
.input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
textarea.input{min-height:90px; resize:vertical; line-height:1.5}
.search{position:relative; flex:1; min-width:220px}
.search .input{padding-left:34px}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted)}
.chips{display:flex; gap:6px; flex-wrap:wrap}
.chip{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); padding:7px 12px; border-radius:20px; font-size:12.5px; font-weight:500; transition:.15s;}
.chip:hover{border-color:var(--accent); color:var(--accent)}
.chip.active{background:var(--accent); color:var(--on-accent); border-color:var(--accent)}
.tb-sep{width:1px; align-self:stretch; background:var(--line); margin:2px 0}

/* filtro de status múltiplo */
.multi{position:relative}
.multi-btn{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); padding:8px 32px 8px 11px; border-radius:9px; font-size:13.5px; min-height:37px; min-width:190px; text-align:left; transition:.15s; position:relative;}
.multi-btn:hover{border-color:var(--accent)}
.multi-btn .car{position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted)}
.multi-btn.on{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
.multi-panel{position:absolute; z-index:60; top:calc(100% + 6px); left:0; width:270px; max-height:340px; overflow:auto;
  background:var(--surface); border:1px solid var(--line-strong); border-radius:12px; box-shadow:var(--shadow); padding:8px;}
.multi-quick{display:flex; gap:5px; flex-wrap:wrap; padding:2px 4px 8px; border-bottom:1px solid var(--line); margin-bottom:6px}
.multi-quick button{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); border-radius:20px; padding:4px 10px; font-size:11.5px; font-weight:600}
.multi-quick button:hover{border-color:var(--accent); color:var(--accent)}
.multi-opt{display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:9px; cursor:pointer; font-size:13px; user-select:none}
.multi-opt:hover{background:var(--surface-2)}
.multi-opt .swatch{width:9px; height:9px; border-radius:50%; background:var(--tone); flex:none}
.multi-opt .cn{margin-left:auto; font-size:11px; color:var(--muted)}

/* checkbox */
.check{appearance:none; -webkit-appearance:none; width:17px; height:17px; border:1.5px solid var(--line-strong); border-radius:5px;
  background:var(--surface); display:inline-grid; place-items:center; cursor:pointer; transition:.12s; flex:none; margin:0}
.check:hover{border-color:var(--accent)}
.check:checked{background:var(--accent); border-color:var(--accent)}
.check:checked::after{content:""; width:9px; height:5px; border:2px solid var(--on-accent); border-top:0; border-right:0; transform:rotate(-45deg) translateY(-1px)}
.check:indeterminate{background:var(--accent); border-color:var(--accent)}
.check:indeterminate::after{content:""; width:9px; height:2px; background:var(--on-accent)}

.date-group{margin-bottom:22px}
.date-head{display:flex; align-items:center; gap:12px; padding:0 4px 10px;}
.date-head h3{margin:0; font-weight:700; font-size:16px; letter-spacing:-.02em;}
.date-head .count{font-size:12px; color:var(--muted); background:var(--surface-2); padding:3px 10px; border-radius:20px; font-weight:500}
.date-head .rule{flex:1; height:1px; background:var(--line)}
.date-head .selall{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); font-weight:500; cursor:pointer}
.table-shell{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
table{width:100%; border-collapse:collapse}
thead th{text-align:left; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:700; padding:11px 14px; background:var(--surface-2); border-bottom:1px solid var(--line);}
tbody td{padding:11px 14px; border-bottom:1px solid var(--line); vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--surface-2)}
tbody tr.sel td{background:var(--accent-soft)}
th.cbx, td.cbx{width:40px; padding-right:0}
.nome{font-weight:600; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.pecas{font-size:11px; color:var(--muted); background:var(--surface-2); border:1px solid var(--line); padding:1px 7px; border-radius:20px; font-weight:500; white-space:nowrap}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace; font-size:12.5px; color:var(--ink-soft)}
.code-cell{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.code-cell .code{font-family:"IBM Plex Mono",ui-monospace,monospace; font-size:12.5px; letter-spacing:.02em}
.lock{font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--accent); background:var(--accent-soft); border-radius:20px; padding:2px 7px}
.mini{border:1px solid var(--line-strong); background:var(--surface); color:var(--muted); width:27px; height:27px; border-radius:7px; display:grid; place-items:center; transition:.15s; flex:none;}
.mini:hover{border-color:var(--accent); color:var(--accent)}
.mini.on{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
.row-actions{display:flex; gap:6px; justify-content:flex-end}
.obs-line{font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:5px; align-items:flex-start; max-width:340px}

/* previsão de entrega */
.date-pick{position:relative; display:inline-flex}
.date-pick > input[type="date"]{position:absolute; inset:0; width:100%; height:100%; opacity:0; border:0; padding:0; margin:0; cursor:pointer}
.prev-chip{border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-soft); border-radius:8px; padding:5px 10px;
  font-size:12.5px; font-weight:500; display:inline-flex; align-items:center; gap:6px; transition:.15s; white-space:nowrap}
.prev-chip:hover{border-color:var(--accent); color:var(--accent)}
.prev-chip.empty{color:var(--muted)}
.prev-chip.hoje{border-color:#C99A3F; color:#C99A3F; background:color-mix(in srgb,#C99A3F 12%,var(--surface))}
.prev-chip.atras{border-color:#C0553F; color:#C0553F; background:color-mix(in srgb,#C0553F 10%,var(--surface))}
.prev-wrap{display:inline-flex; align-items:center; gap:4px}

/* status badge / select */
.badge{
  display:inline-flex; align-items:center; gap:6px; border:1px solid transparent; border-radius:20px;
  padding:6px 12px; font-size:12px; font-weight:600; white-space:nowrap; cursor:pointer; transition:.15s;
  background:color-mix(in srgb, var(--tone) var(--tone-mix), var(--surface));
  color:var(--tone);
}
.badge:hover{filter:brightness(.97)}
.badge .caret{opacity:.6}
.badge-select{
  appearance:none; border:1px solid transparent; border-radius:20px; padding:9px 30px 9px 14px;
  font-size:13px; font-weight:600; cursor:pointer; align-self:flex-start;
  background-color:color-mix(in srgb, var(--tone) var(--tone-mix), var(--surface));
  color:var(--tone);
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat; background-position:right 11px center;
}
.badge-select:focus{outline:none; box-shadow:0 0 0 3px var(--accent-soft)}

/* ================= BARRA DE SELEÇÃO ================= */
.bulkbar{position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:70; max-width:calc(100vw - 24px);
  background:var(--surface); border:1px solid var(--line-strong); box-shadow:var(--shadow); border-radius:16px;
  padding:10px 12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; animation:up .2s cubic-bezier(.2,.8,.3,1)}
@keyframes up{from{opacity:0; transform:translate(-50%,10px)}to{opacity:1; transform:translate(-50%,0)}}
.bulkbar .cnt{font-weight:700; font-size:13.5px; padding:0 6px 0 4px; white-space:nowrap}
.bulkbar select.input{min-width:180px}
.bulkbar .sep{width:1px; align-self:stretch; background:var(--line)}

/* ================= EMPTY / PANELS ================= */
.empty{text-align:center; padding:70px 24px; background:var(--surface); border:1px dashed var(--line-strong); border-radius:var(--radius);}
.empty .ico{font-size:34px; margin-bottom:8px}
.empty .ico .em{width:38px;height:38px}
.empty h3{font-weight:700; margin:0 0 6px; font-size:18px; letter-spacing:-.02em}
.empty p{color:var(--muted); margin:0 0 18px; max-width:420px; margin-inline:auto}

.panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; margin-bottom:18px}
.panel h2{font-weight:700; font-size:18px; margin:0 0 4px; letter-spacing:-.02em}
.panel .desc{color:var(--muted); margin:0 0 18px; font-size:13px}
.drop{border:2px dashed var(--line-strong); border-radius:var(--radius); padding:40px 24px; text-align:center; transition:.18s; cursor:pointer; background:var(--surface-2);}
.drop:hover,.drop.over{border-color:var(--accent); background:var(--accent-soft)}
.drop .ico .em{width:34px;height:34px;margin-bottom:8px}
.drop h3{margin:0 0 4px; font-size:15px; font-weight:600}
.drop p{margin:0; color:var(--muted); font-size:12.5px}
.cols-detected{display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 4px}
.col-tag{font-size:12px; font-weight:500; padding:5px 11px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; border:1px solid transparent}
.col-tag.ok{background:color-mix(in srgb,#3F8768 14%,var(--surface)); color:#3F8768}
.col-tag.miss{background:color-mix(in srgb,#C0553F 14%,var(--surface)); color:#C0553F}
.summary{display:flex; gap:22px; flex-wrap:wrap; margin:14px 0; padding:16px; background:var(--surface-2); border-radius:12px}
.summary .s .n{font-size:24px; font-weight:700; line-height:1; letter-spacing:-.03em}
.summary .s .l{font-size:11.5px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.04em; font-weight:600}
.radio-row{display:flex; gap:10px; margin:6px 0; flex-wrap:wrap}
.radio-card{flex:1; min-width:230px; border:1px solid var(--line-strong); border-radius:11px; padding:13px 15px; cursor:pointer; transition:.15s; display:flex; gap:11px; align-items:flex-start;}
.radio-card:hover{border-color:var(--accent)}
.radio-card.sel{border-color:var(--accent); background:var(--accent-soft)}
.radio-card input{margin-top:3px; accent-color:var(--accent)}
.radio-card .t{font-weight:600; font-size:13.5px}
.radio-card .d{font-size:12px; color:var(--muted); margin-top:2px}
.danger-zone{border:1px solid #C0553F; background:color-mix(in srgb,#C0553F 10%,var(--surface)); border-radius:11px; padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.danger-zone .t{font-weight:600; font-size:13.5px; color:#C0553F}
.danger-zone .d{font-size:12px; color:var(--ink-soft)}

/* ================= MODAIS ================= */
.overlay{position:fixed; inset:0; z-index:80; background:rgba(20,14,12,.42); backdrop-filter:blur(3px); display:grid; place-items:center; padding:18px; animation:fade .18s ease}
.modal{background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); width:100%; max-width:560px; max-height:88vh; overflow:auto; animation:pop .2s cubic-bezier(.2,.8,.3,1)}
@keyframes pop{from{opacity:0; transform:scale(.96) translateY(8px)}to{opacity:1; transform:none}}
.modal-head{display:flex; align-items:center; gap:12px; padding:18px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--surface); z-index:2}
.modal-head h3{margin:0; font-size:16.5px; font-weight:700; letter-spacing:-.02em; flex:1}
.modal-body{padding:20px}
.modal-foot{display:flex; gap:10px; justify-content:flex-end; padding:16px 20px; border-top:1px solid var(--line); position:sticky; bottom:0; background:var(--surface); flex-wrap:wrap}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px}
.fg{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
.fg label{font-size:11.5px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em}
.hint{font-size:12px; color:var(--muted); margin-top:4px}

.status-list{display:flex; flex-direction:column; gap:4px; max-height:340px; overflow:auto; margin:-4px}
.status-opt{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; border:1px solid transparent; background:transparent; text-align:left; width:100%; transition:.12s; font-size:13.5px; font-weight:500; color:var(--ink)}
.status-opt:hover{background:var(--surface-2)}
.status-opt.sel{border-color:var(--accent); background:var(--accent-soft)}
.status-opt .swatch{width:10px; height:10px; border-radius:50%; background:var(--tone); flex:none}
.status-opt .custom-tag{margin-left:auto; font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}

.theme-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px}
.theme-card{border:1px solid var(--line-strong); border-radius:12px; padding:12px; background:var(--surface); display:flex; flex-direction:column; gap:9px; transition:.15s; text-align:left}
.theme-card:hover{border-color:var(--accent)}
.theme-card.sel{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.theme-card .swatches{display:flex; gap:4px}
.theme-card .sw{width:22px; height:22px; border-radius:6px; border:1px solid rgba(0,0,0,.08)}

function parseDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date && !isNaN(v)) return toISO(v);
  if(typeof v==="number" && isFinite(v)){ const d=new Date(Math.round((v-25569)*86400000)); if(!isNaN(d)) return toISO(d); }
  const s=String(v).trim();
  let m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if(m){ let[_,y,mo,d]=m; return `${y}-${pad(mo)}-${pad(d)}`; }
  m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){ let[_,d,mo,y]=m; if(y.length===2) y="20"+y; return `${y}-${pad(mo)}-${pad(d)}`; }
  const d2 = new Date(s);
  if(!isNaN(d2)) return toISO(d2);
  return "";
}
const fmtDate = iso => { if(!iso) return ""; const[y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; };
const fmtShort = iso => { if(!iso) return ""; const[y,m,d]=iso.split("-"); return `${d}/${m}`; };

  if(!iso) return "Sem data de faturamento";

  const meses=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${d} de ${meses[+m-1]}. de ${y}`;
}
function fmtCPF(v){

  return String(v||"");
}

const FIELDS=[
  {key:"pedido",     label:"Número do Pedido",   aliases:["numero do pedido","n do pedido","pedido","numero pedido"]},
  {key:"nome",       label:"Nome do contato",    aliases:["nome do contato","nome contato","nome do cliente","cliente","contato","nome"]},
  {key:"rastreio",   label:"Cód. Rastreamento",  aliases:["cod rastreamento","codigo de rastreamento","codigo rastreamento","rastreamento","rastreio"]},
  {key:"faturamento",label:"Data de Faturamento",aliases:["data de faturamento","data faturamento","faturamento"]},
  {key:"cpf",        label:"CPF/CNPJ",           aliases:["cpf cnpj","cpf","cnpj","documento"]},
];
function resolveCols(headers){
  const res={}, used=new Set();
  FIELDS.forEach(f=>{
    let hit=headers.find(h=>!used.has(h)&&norm(h)===norm(f.label));
    if(!hit) hit=headers.find(h=>!used.has(h)&&f.aliases.includes(norm(h)));
    if(hit){ used.add(hit); res[f.key]=hit; }
  });
  return res;
}
function rowsToEnvios(rows, cols){
  const map=new Map();
  rows.forEach(r=>{
    const ped=cols.pedido?String(r[cols.pedido]??"").trim():"";
    const key=ped || ("__"+map.size);
    const ras=cols.rastreio?String(r[cols.rastreio]??"").trim():"";
    const fat=cols.faturamento?parseDate(r[cols.faturamento]):"";
    if(!map.has(key)){
      map.set(key,{ pedido:ped,
        nome:cols.nome?String(r[cols.nome]??"").trim():"",
        cpf:cols.cpf?String(r[cols.cpf]??"").trim():"",
        rastreio:ras, faturamento:fat, itens:1 });
    }else{
      const g=map.get(key); g.itens++;
      if(!g.rastreio&&ras) g.rastreio=ras;
      if(!g.faturamento&&fat) g.faturamento=fat;
    }
  });
  return [...map.values()].map(e=>({ ...e, id:uid(), obs:"", previsao:"",
    status: e.rastreio?STATUS_IMPORT:"Aguardando", statusManual:false, rastreioManual:false }));
}
/* devolve { data, added, updated, changed } — changed = só o que precisa ir pra planilha */
function mergeEnvios(current, incoming, mode){
  if(mode==="replace") return { data:incoming, added:incoming.length, updated:0, changed:incoming };
  const data=current.map(e=>({...e}));
  const byPed=new Map(data.filter(e=>e.pedido).map(e=>[e.pedido,e]));
  let added=0, updated=0; const changed=[];
  incoming.forEach(inc=>{
    const ex=inc.pedido?byPed.get(inc.pedido):null;
    if(ex){
      let ch=false;
      // rastreio editado à mão (expedição avulsa) NUNCA é sobrescrito pela planilha
      if(inc.rastreio && inc.rastreio!==ex.rastreio && !ex.rastreioManual){ ex.rastreio=inc.rastreio; ch=true; }
      if(inc.faturamento && !ex.faturamento){ ex.faturamento=inc.faturamento; ch=true; }
      if(inc.itens>ex.itens){ ex.itens=inc.itens; ch=true; }
      if(!ex.statusManual && ex.rastreio && ex.status==="Aguardando"){ ex.status=STATUS_IMPORT; ch=true; }
      if(ch){ updated++; changed.push(ex); }
    }else{
      data.push(inc); if(inc.pedido) byPed.set(inc.pedido,inc); added++; changed.push(inc);
    }
  });
  return { data, added, updated, changed };
}
function guessDelimiter(text){
  const line=(text.split(/\r?\n/)[0]||"");
  const c={";":0,",":0,"\t":0};
  for(const ch of line) if(ch in c) c[ch]++;
  return Object.keys(c).sort((a,b)=>c[b]-c[a])[0]||",";
}

function Modal({title, icon, onClose, children, foot, wide}){
  useEffect(()=>{
    const h=e=>e.key==="Escape"&&onClose();
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[onClose]);
  return (<div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={wide?{maxWidth:680}:null}>
      <div className="modal-head">
        {icon && <Em c={icon} size={20}/>}
        <h3>{title}</h3>
        <button className="mini" onClick={onClose}><Ic d={I.x} size={14}/></button>
      </div>
      <div className="modal-body">{children}</div>
      {foot && <div className="modal-foot">{foot}</div>}
    </div>
  </div>);
}

function MultiStatus({statuses, value, counts, onChange}){
  const [open,setOpen]=useState(false);
  const box=useRef(null);
  useEffect(()=>{
    if(!open) return;
    const h=ev=>{ if(box.current && !box.current.contains(ev.target)) setOpen(false); };
    const k=ev=>ev.key==="Escape"&&setOpen(false);
    document.addEventListener("mousedown",h); document.addEventListener("keydown",k);
    return ()=>{ document.removeEventListener("mousedown",h); document.removeEventListener("keydown",k); };
  },[open]);
  const label = value.length===0 ? "Todos os status" : value.length===1 ? value[0] : value.length+" status selecionados";
  const toggle=n=>onChange(value.includes(n)?value.filter(x=>x!==n):[...value,n]);
  return (<div className="multi" ref={box}>
    <button className={"multi-btn"+(value.length?" on":"")} onClick={()=>setOpen(o=>!o)}>
      {label}<Ic className="car" d={I.caret} size={13}/>
    </button>
    {open && <div className="multi-panel">
      <div className="multi-quick">
        <button onClick={()=>onChange(EM_ROTA.slice())}>Em rota</button>
        <button onClick={()=>onChange(PROBLEMAS.slice())}>Problemas</button>
        <button onClick={()=>onChange(FINALIZADOS.slice())}>Finalizados</button>
        <button onClick={()=>onChange([])}>Limpar</button>
      </div>
      {statuses.map(s=>(
        <label key={s.nome} className="multi-opt" style={{"--tone":s.cor}}>
          <input className="check" type="checkbox" checked={value.includes(s.nome)} onChange={()=>toggle(s.nome)}/>
          <span className="swatch"></span>{s.nome}
          <span className="cn">{counts[s.nome]||0}</span>
        </label>
      ))}
    </div>}
  </div>);
}

function EnviosView({data, rows, statuses, filters, setFilters, goImport, sel, onToggleGroup, ...h}){
  const [limite,setLimite]=useState(PAGE);
  useEffect(()=>{ setLimite(PAGE); },[filters]);

  const counts=useMemo(()=>{
    const c={}; data.forEach(r=>{ c[r.status]=(c[r.status]||0)+1; }); return c;
  },[data]);

  const visiveis = rows.slice(0, limite);
  const groups=useMemo(()=>{
    const g={};
    visiveis.forEach(r=>{ const k=r.faturamento||"__none__"; (g[k]=g[k]||[]).push(r); });
    const keys=Object.keys(g).sort((a,b)=> a==="__none__"?1 : b==="__none__"?-1 : b.localeCompare(a));
    return keys.map(k=>({iso:k==="__none__"?"":k, rows:g[k]}));
  },[visiveis]);

  const preset=r=>{
    const now=new Date(); let from="",to="";
    if(r==="today"){ from=toISO(now); to=from; }
    else if(r==="7"){ const p=new Date(now); p.setDate(p.getDate()-6); from=toISO(p); to=toISO(now); }
    else if(r==="month"){ from=toISO(new Date(now.getFullYear(),now.getMonth(),1)); to=toISO(now); }
    setFilters(f=>({...f,range:r,from,to}));
  };

  return (<div className="view">
    <Cards rows={rows}/>
    <div className="toolbar">
      <div className="search">
        <Ic d={I.search} size={16}/>
        <input className="input" placeholder="Buscar por nome, CPF, pedido, código ou observação…" value={filters.q}
          onChange={e=>setFilters(f=>({...f,q:e.target.value}))}/>
      </div>
      <div className="tb-sep"></div>
      <div className="field"><label>Faturamento de</label>
        <input type="date" className="input" value={filters.from} onChange={e=>setFilters(f=>({...f,from:e.target.value,range:""}))}/></div>
      <div className="field"><label>até</label>
        <input type="date" className="input" value={filters.to} onChange={e=>setFilters(f=>({...f,to:e.target.value,range:""}))}/></div>
      <div className="field"><label>Status (pode marcar vários)</label>
        <MultiStatus statuses={statuses} value={filters.status} counts={counts}
          onChange={v=>setFilters(f=>({...f,status:v}))}/></div>
      <div className="field">
        <div className="chips">
          {[["today","Hoje"],["7","7 dias"],["month","Este mês"],["all","Tudo"]].map(([r,l])=>(
            <button key={r} className={"chip"+(filters.range===r?" active":"")}
              onClick={()=>r==="all"?setFilters(f=>({...f,range:"all",from:"",to:""})):preset(r)}>{l}</button>
          ))}
        </div>
      </div>
    </div>

    {data.length===0 ? (
      <div className="empty"><div className="ico"><Em c="📭"/></div><h3>Nenhum envio ainda</h3>
        <p>Importe o CSV de vendas do Eccosys para organizar os rastreios por data de faturamento.</p>
        <button className="btn" onClick={goImport}><Em c="📥"/> Importar planilha</button></div>
    ) : rows.length===0 ? (
      <div className="empty"><div className="ico"><Em c="🔍"/></div><h3>Nada por aqui</h3>
        <p>Nenhum envio bate com os filtros atuais. Tente limpar a busca ou ampliar o período.</p>
        <button className="btn ghost" onClick={()=>setFilters({q:"",from:"",to:"",status:[],range:"all"})}>Limpar filtros</button></div>
    ) : (<React.Fragment>
      {groups.map(g=><DateGroup key={g.iso||"none"} iso={g.iso} rows={g.rows} statuses={statuses} sel={sel} onToggleGroup={onToggleGroup} {...h}/>)}
      {rows.length>limite &&
        <button className="more" onClick={()=>setLimite(l=>l+PAGE)}>Mostrar mais {Math.min(PAGE, rows.length-limite)} de {rows.length-limite}</button>}
    </React.Fragment>)}
  </div>);
}

   IMPORTAR
   ============================================================ */
function ImportView({data,onImport,onClear,toast}){
  const [over,setOver]=useState(false);
  const [pending,setPending]=useState(null);
  const [mode,setMode]=useState("append");
  const fileRef=useRef(null);

  const handleFile=useCallback((file)=>{
    if(!file) return;
    const name=file.name.toLowerCase();
    const finish=(headers,rows)=>{
      const cols=resolveCols(headers);
      const missing=FIELDS.filter(f=>!cols[f.key]).map(f=>f.label);
      if(!cols.pedido && !cols.rastreio && !cols.nome){
        toast("Não reconheci as colunas dessa planilha. Confira se é o export de vendas do Eccosys.","warn"); return;
      }
      setPending({envios:rowsToEnvios(rows,cols), cols, missing, rawCount:rows.length});
    };
    if(name.endsWith(".csv")){
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          let text=String(ev.target.result).replace(/^\uFEFF/,"");
          const res=Papa.parse(text,{header:true,skipEmptyLines:true,delimiter:guessDelimiter(text)});
          finish(res.meta.fields||[], res.data);
        }catch(err){ console.error(err); toast("Não consegui ler o CSV.","warn"); }
      };
      reader.readAsText(file,"utf-8");
    }else if(name.endsWith(".xlsx")||name.endsWith(".xls")){
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array",cellDates:true});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:true,blankrows:false});
          const headers=(aoa[0]||[]).map(h=>String(h).trim());
          const rows=aoa.slice(1).map(row=>{ const o={}; headers.forEach((h,i)=>o[h]=row[i]); return o; })
            .filter(o=>Object.values(o).some(v=>v!==""&&v!=null));
          finish(headers,rows);
        }catch(err){ console.error(err); toast("Não consegui ler o Excel.","warn"); }
      };
      reader.readAsArrayBuffer(file);
    }else{ toast("Formato não suportado. Use .csv, .xlsx ou .xls","warn"); }
  },[toast]);

  const comRastreio = pending ? pending.envios.filter(e=>e.rastreio).length : 0;

  return (<div className="view">
    <div className="panel">
      <h2>Importar planilha de vendas</h2>
      <p className="desc">Solte o <b>.csv</b> exportado do Eccosys (também aceita .xlsx). O sistema puxa <b>Número do Pedido</b>, <b>Nome do contato</b>, <b>Cód. Rastreamento</b>, <b>Data de Faturamento</b> e <b>CPF/CNPJ</b> — e junta as linhas de produtos num envio por pedido. Quem chega com código entra como <b>{STATUS_IMPORT}</b>.</p>

      <div className={"drop"+(over?" over":"")}
        onClick={()=>fileRef.current.click()}
        onDragEnter={e=>{e.preventDefault();setOver(true);}}
        onDragOver={e=>{e.preventDefault();setOver(true);}}
        onDragLeave={e=>{e.preventDefault();setOver(false);}}
        onDrop={e=>{e.preventDefault();setOver(false);handleFile(e.dataTransfer.files[0]);}}>
        <div className="ico"><Em c="📦"/></div>
        <h3>Arraste o CSV aqui ou clique para escolher</h3>
        <p>O arquivo é lido no navegador e depois gravado na sua planilha do Google.</p>
        <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" hidden
          onChange={e=>{ handleFile(e.target.files[0]); e.target.value=""; }}/>
      </div>

      {pending && (<div style={{marginTop:20}}>
        <div className="cols-detected">
          {FIELDS.map(f=>(
            <span key={f.key} className={"col-tag "+(pending.cols[f.key]?"ok":"miss")}>
              <Ic d={pending.cols[f.key]?I.check:I.x} size={13} sw={2.5}/>{f.label}
            </span>
          ))}
        </div>
        <div className="summary">
          <div className="s"><div className="n">{pending.envios.length}</div><div className="l">Envios (pedidos)</div></div>
          <div className="s"><div className="n">{comRastreio}</div><div className="l">Com rastreio</div></div>
          <div className="s"><div className="n">{pending.envios.length-comRastreio}</div><div className="l">Aguardando</div></div>
          <div className="s"><div className="n">{pending.rawCount}</div><div className="l">Linhas no arquivo</div></div>
        </div>

        <div className="radio-row">
          <label className={"radio-card"+(mode==="append"?" sel":"")}>
            <input type="radio" name="mode" checked={mode==="append"} onChange={()=>setMode("append")}/>
            <div><div className="t">Atualizar / adicionar</div><div className="d">Mantém os envios atuais, preenche rastreios novos e adiciona pedidos que faltavam. Não mexe em status, observações, previsão nem em códigos que você editou à mão.</div></div>
          </label>
          <label className={"radio-card"+(mode==="replace"?" sel":"")}>
            <input type="radio" name="mode" checked={mode==="replace"} onChange={()=>setMode("replace")}/>
            <div><div className="t">Substituir tudo</div><div className="d">Apaga os envios da planilha e usa só os deste arquivo.</div></div>
          </label>
        </div>

        <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap"}}>
          <button className="btn" onClick={()=>{ onImport(pending.envios,mode); setPending(null); }}>
            <Ic d={I.check} size={15}/> Importar {pending.envios.length} envios</button>
          <button className="btn ghost" onClick={()=>setPending(null)}>Cancelar</button>
        </div>
      </div>)}
    </div>

    <div className="panel">
      <div className="danger-zone">
        <div style={{flex:1}}>
          <div className="t">Limpar todos os envios</div>
          <div className="d">Apaga todas as linhas da aba <b>Envios</b> da planilha. Não dá pra desfazer — exporte antes se precisar.</div>
        </div>
        <button className="btn danger sm" onClick={onClear} disabled={!data.length}>Limpar tudo</button>
      </div>
    </div>
  </div>);
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [theme,setTheme]=useState(()=>LS.get("qv_theme","claro"));
  const [auth,setAuth]=useState(()=>LS.get("qv_auth","")==="ok");
  const [loading,setLoading]=useState(true);
  const [online,setOnline]=useState(true);
  const [busy,setBusy]=useState(0);
  const [data,setData]=useState([]);
  const [custom,setCustom]=useState([]);
  const [view,setView]=useState("envios");
  const [filters,setFilters]=useState({q:"",from:"",to:"",status:[],range:"all"});
  const [sel,setSel]=useState(()=>new Set());
  const [bulkStatus,setBulkStatus]=useState("Entregue");
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);

  const dataRef=useRef([]);                 // última lista, sem re-render
  const pendingRef=useRef(new Set());       // ids com gravação em andamento
  const queueRef=useRef(Promise.resolve()); // fila: um POST por vez

  useEffect(()=>{ dataRef.current=data; },[data]);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); LS.set("qv_theme",theme); },[theme]);

  const toast=useCallback((msg,kind)=>{
    const id=uid(); setToasts(t=>[...t,{id,msg,kind}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  },[]);

  const statuses = useMemo(()=>{
    const map=new Map();
    STATUS_BASE.forEach(s=>map.set(s.nome,s));
    custom.forEach(s=>{ if(!map.has(s.nome)) map.set(s.nome,s); });
    return [...map.values()];
  },[custom]);

  /* ---------- leitura (não atropela o que está sendo salvo) ---------- */
  const load=useCallback(async(silent)=>{
    if(silent && (pendingRef.current.size>0 || document.hidden)) return;
    if(!silent) setLoading(true);
    try{
      const j=await API.get();
      const local=new Map(dataRef.current.map(e=>[e.id,e]));
      const vindo=(j.envios||[]).map(e=>{
        const id=e.id;
        if(id && pendingRef.current.has(id) && local.has(id)) return local.get(id); // versão local vence
        return limpar(e);
      });
      const ids=new Set(vindo.map(e=>e.id));
      pendingRef.current.forEach(id=>{ if(!ids.has(id) && local.has(id)) vindo.push(local.get(id)); });
      setData(vindo); setCustom(j.statuses||[]); setOnline(true);
    }catch(e){
      setOnline(false);
      if(!silent) toast("Não consegui falar com a planilha. Confira a URL do Apps Script.","warn");
    }finally{ setLoading(false); }
  },[toast]);

  useEffect(()=>{ if(auth) load(); },[auth,load]);
  useEffect(()=>{
    if(!auth) return;
    const t=setInterval(()=>load(true),SYNC_MS);
    const vis=()=>{ if(!document.hidden) load(true); };
    document.addEventListener("visibilitychange",vis);
    return ()=>{ clearInterval(t); document.removeEventListener("visibilitychange",vis); };
  },[auth,load]);

  /* ---------- escrita em fila ---------- */
  const send=useCallback((body, okMsg, ids)=>{
    if(ids) ids.forEach(id=>pendingRef.current.add(id));
    setBusy(b=>b+1);
    const run=async()=>{
      try{
        const r=await API.post(body);
        setOnline(true);
        if(okMsg) toast(okMsg,"good");
        return r;
      }catch(err){
        setOnline(false);
        toast("Erro ao salvar na planilha: "+err.message,"warn");
        throw err;
      }finally{
        if(ids) ids.forEach(id=>pendingRef.current.delete(id));
        setBusy(b=>b-1);
      }
    };
    const p=queueRef.current.then(run,run);
    queueRef.current=p.catch(()=>{});
    return p;
  },[toast]);

  /* ---------- ações ---------- */
  const saveEnvio=useCallback(async(env)=>{
    setData(d=>d.map(e=>e.id===env.id?env:e));
    setModal(null);
    try{ await send({action:"save", envio:env}, "Salvo ✓", [env.id]); }catch(e){ load(true); }
  },[send,load]);

  const setStatus=useCallback(async(env,novo)=>{
    const upd={...env, status:novo, statusManual:true};
    setData(d=>d.map(e=>e.id===env.id?upd:e));
    try{ await send({action:"save", envio:upd}, null, [env.id]); }catch(e){ load(true); }
  },[send,load]);

  const setPrevisao=useCallback(async(env,iso)=>{
    const upd={...env, previsao: iso ? parseDate(iso) : ""};
    setData(d=>d.map(e=>e.id===env.id?upd:e));
    try{ await send({action:"save", envio:upd}, iso?("Previsão: "+fmtDate(upd.previsao)+" ✓"):"Previsão removida", [env.id]); }
    catch(e){ load(true); }
  },[send,load]);

  const removeEnvio=useCallback(async(env)=>{
    if(!window.confirm(`Apagar o envio de ${env.nome||"sem nome"}${env.pedido?" (pedido "+env.pedido+")":""}?`)) return;
    setData(d=>d.filter(e=>e.id!==env.id));
    setSel(s=>{ const n=new Set(s); n.delete(env.id); return n; });
    try{ await send({action:"delete", id:env.id}, "Envio apagado", [env.id]); }catch(e){ load(true); }
  },[send,load]);

  const clearAll=async()=>{
    if(!window.confirm("Apagar TODOS os envios da planilha? Não dá pra desfazer.")) return;
    setData([]); setSel(new Set());
    try{ await send({action:"clear"}, "Tudo limpo"); }catch(e){ load(true); }
  };

  const doImport=async(envios,mode)=>{
    const r=mergeEnvios(dataRef.current,envios,mode);
    setData(r.data); setView("envios"); setSel(new Set());
    try{
      if(mode==="replace") await send({action:"bulkSave", envios:r.data});
      else if(r.changed.length) await send({action:"saveMany", envios:r.changed}, null, r.changed.map(e=>e.id));
      toast(mode==="replace" ? `${r.added} envios importados ✓` :
        `${r.added} novo${r.added!==1?"s":""} · ${r.updated} atualizado${r.updated!==1?"s":""} ✓`, "good");
    }catch(e){ load(true); }
  };

  const addStatus=async(nome,cor)=>{
    setCustom(c=>[...c,{nome,cor}]);
    try{ const r=await send({action:"addStatus", nome, cor}, `Status “${nome}” criado ✓`); if(r&&r.statuses) setCustom(r.statuses); }catch(e){ load(true); }
  };
  const delStatus=async(nome)=>{
    if(!window.confirm(`Apagar o status “${nome}”? Os envios que já usam ele continuam com o texto.`)) return;
    setCustom(c=>c.filter(s=>s.nome!==nome));
    try{ const r=await send({action:"deleteStatus", nome}); if(r&&r.statuses) setCustom(r.statuses); }catch(e){ load(true); }
  };

  const onCopy=useCallback(async code=>{ (await copy(code)) ? toast("Código copiado ✓","good") : toast("Não consegui copiar","warn"); },[toast]);
  const onShare=useCallback(async env=>{
    const url=trackUrl(env.rastreio);
    const texto=`Olá${env.nome?", "+env.nome.split(" ")[0]:""}! 👗 Seu pedido da QVestido já está a caminho.\nCódigo de rastreio: ${env.rastreio}\nAcompanhe aqui: ${url}`;
    if(navigator.share){
      try{ await navigator.share({title:"Rastreio QVestido", text:texto, url}); return; }catch(e){ if(e.name==="AbortError") return; }
    }
    (await copy(texto)) ? toast("Mensagem de rastreio copiada ✓","good") : toast("Não consegui copiar","warn");
  },[toast]);

  const openStatus=useCallback(e=>setModal({tipo:"status", envio:e}),[]);
  const openEdit=useCallback(e=>setModal({tipo:"edit", envio:e}),[]);
  const openObs=useCallback(e=>setModal({tipo:"obs", envio:e}),[]);

  /* ---------- seleção ---------- */
  const toggleOne=useCallback(id=>setSel(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; }),[]);
  const toggleGroup=useCallback((ids,marcar)=>setSel(s=>{
    const n=new Set(s); ids.forEach(id=>marcar?n.add(id):n.delete(id)); return n;
  }),[]);

  /* ---------- filtro (calculado uma vez só) ---------- */
  const filtered=useMemo(()=>{
    const q=norm(filters.q);
    const st=filters.status;
    return data.filter(r=>{
      if(st.length && st.indexOf(r.status)<0) return false;
      if(filters.from&&(!r.faturamento||r.faturamento<filters.from)) return false;
      if(filters.to&&(!r.faturamento||r.faturamento>filters.to)) return false;
      if(q){ const hay=norm([r.nome,r.cpf,r.pedido,r.rastreio,r.obs].join(" ")); if(!hay.includes(q)) return false; }
      return true;
    });
  },[data,filters]);

  const selecionarTudoFiltrado=()=>setSel(new Set(filtered.map(e=>e.id)));

  const aplicarStatusEmLote=async(nome)=>{
    const ids=[...sel];
    if(!ids.length) return;
    const setIds=new Set(ids);
    const upds=dataRef.current.filter(e=>setIds.has(e.id)).map(e=>({...e,status:nome,statusManual:true}));
    setData(d=>d.map(e=>setIds.has(e.id)?{...e,status:nome,statusManual:true}:e));
    setSel(new Set());
    try{ await send({action:"saveMany", envios:upds}, `${ids.length} envio${ids.length>1?"s":""} → ${nome} ✓`, ids); }
    catch(e){ load(true); }
  };
  const apagarEmLote=async()=>{
    const ids=[...sel];
    if(!ids.length) return;
    if(!window.confirm(`Apagar ${ids.length} envio${ids.length>1?"s":""}? Não dá pra desfazer.`)) return;
    const setIds=new Set(ids);
    setData(d=>d.filter(e=>!setIds.has(e.id)));
    setSel(new Set());
    try{ await send({action:"deleteMany", ids}, `${ids.length} envio${ids.length>1?"s":""} apagado${ids.length>1?"s":""}`, ids); }
    catch(e){ load(true); }
  };

  const onExport=()=>{
    if(!filtered.length){ toast("Nada para exportar","warn"); return; }
    const aoa=[["Número do Pedido","Nome do contato","CPF/CNPJ","Cód. Rastreamento","Data de Faturamento","Previsão de entrega","Status","Observações","Peças","Link Correios"]];
    filtered.forEach(e=>aoa.push([e.pedido,e.nome,fmtCPF(e.cpf),e.rastreio,fmtDate(e.faturamento),fmtDate(e.previsao),e.status,e.obs||"",e.itens, e.rastreio?trackUrl(e.rastreio):""]));
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:14},{wch:28},{wch:18},{wch:18},{wch:16},{wch:18},{wch:22},{wch:38},{wch:7},{wch:52}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Envios");
    XLSX.writeFile(wb,`qvestido_envios_${toISO(new Date())}.xlsx`);
    toast(`${filtered.length} envios exportados ✓`,"good");
  };

  /* ---------- render ---------- */
  if(!auth) return <Login theme={theme} setTheme={setTheme} onOk={()=>{ LS.set("qv_auth","ok"); setAuth(true); }}/>;

  return (<React.Fragment>
    <div className="topbar"><div className="topbar-inner">
      <div className="brand">
        <img src={LOGO} alt="QVestido"/>
        <span className="sub">Rastreamento · Correios</span>
      </div>
      <div className="nav">
        <button className={view==="envios"?"active":""} onClick={()=>setView("envios")}>
          <Ic d={I.menu}/> <span className="lbl">Envios</span> <span className="dot">{data.length}</span>
        </button>
        <button className={view==="importar"?"active":""} onClick={()=>setView("importar")}>
          <Ic d={I.import}/> <span className="lbl">Importar</span>
        </button>
      </div>
      <div className="spacer"></div>
      <div className={"sync"+(busy>0?" busy":(online?"":" off"))}>
        <span className="pip"></span>
        <span className="lbl">{busy>0?"Salvando…":(online?"Planilha conectada":"Offline")}</span>
      </div>
      <button className="icon-btn" title="Recarregar da planilha" onClick={()=>load()}><Ic d={I.refresh} size={16}/></button>
      <button className="btn ghost sm" onClick={onExport}><Ic d={I.export} size={15}/> <span className="lbl">Exportar</span></button>
      <button className="icon-btn" title="Tema" onClick={()=>setModal({tipo:"tema"})}><Ic d={I.palette} size={17}/></button>
      <button className="icon-btn" title="Sair" onClick={()=>{ LS.del("qv_auth"); setAuth(false); }}><Ic d={I.logout} size={16}/></button>
    </div></div>

    <div className="wrap">
      {loading ? <div className="boot"><div className="spin"></div><div>Buscando os envios na planilha…</div></div>
      : view==="envios" ? (
        <EnviosView
          data={data} rows={filtered} statuses={statuses} filters={filters} setFilters={setFilters}
          goImport={()=>setView("importar")}
          sel={sel} onToggle={toggleOne} onToggleGroup={toggleGroup}
          onStatus={openStatus} onRemove={removeEnvio} onCopy={onCopy} onShare={onShare}
          onEdit={openEdit} onObs={openObs} onPrevisao={setPrevisao}/>
      ) : (
        <ImportView data={data} onImport={doImport} onClear={clearAll} toast={toast}/>
      )}
    </div>

    {view==="envios" && sel.size>0 && (
      <div className="bulkbar">
        <span className="cnt">{sel.size} selecionado{sel.size>1?"s":""}</span>
        <button className="btn sm" onClick={()=>aplicarStatusEmLote("Entregue")}><Ic d={I.check} size={14}/> Marcar como entregue</button>
        <span className="sep"></span>
        <select className="input" value={bulkStatus} onChange={e=>setBulkStatus(e.target.value)} aria-label="Status para aplicar">
          {statuses.map(s=><option key={s.nome} value={s.nome}>{s.nome}</option>)}
        </select>
        <button className="btn ghost sm" onClick={()=>aplicarStatusEmLote(bulkStatus)}>Aplicar</button>
        <span className="sep"></span>
        <button className="btn ghost sm" onClick={selecionarTudoFiltrado}>Selecionar os {filtered.length}</button>
        <button className="btn ghost sm" onClick={apagarEmLote}><Ic d={I.trash} size={14}/></button>
        <button className="mini" title="Limpar seleção" onClick={()=>setSel(new Set())}><Ic d={I.x} size={14}/></button>
      </div>
    )}

    {modal && modal.tipo==="edit" && <EditModal envio={modal.envio} statuses={statuses} onClose={()=>setModal(null)} onSave={saveEnvio}/>}
    {modal && modal.tipo==="obs" && <ObsModal envio={modal.envio} onClose={()=>setModal(null)} onSave={saveEnvio}/>}
    {modal && modal.tipo==="status" && <StatusModal statuses={statuses} atual={modal.envio.status}
      onPick={v=>setStatus(modal.envio,v)}
      onAdd={addStatus} onDelete={delStatus}
      onClose={()=>setModal(null)}/>}
    {modal && modal.tipo==="tema" && <ThemeModal theme={theme} setTheme={setTheme} onClose={()=>setModal(null)}/>}

    <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={"toast"+(t.kind?" "+t.kind:"")}>{t.msg}</div>)}</div>
  </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
